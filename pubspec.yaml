name: nas_audio_player
description: NAS WebDAV audio player for Android

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  webdav_client: ^1.2.0
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  sqflite_common_ffi: ^2.3.3+1
  fake_async: ^1.3.1
  build_runner: ^2.4.11
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
