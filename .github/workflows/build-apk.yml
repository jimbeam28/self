name: Build APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  # ── 静态分析 & 单元测试 ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - name: 静态分析
        run: flutter analyze

      - name: 单元测试
        run: flutter test

  # ── 构建 APK ──────────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - name: 构建 APK
        run: flutter build apk --target-platform android-arm64 --${{ inputs.build_type || 'release' }}

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.build_type || 'release' }}
          path: build/app/outputs/flutter-apk/*.apk
