name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build apk --split-per-abi --${{ inputs.build_type || 'release' }}

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.build_type || 'release' }}
          path: build/app/outputs/flutter-apk/*.apk
